apiVersion: v1
kind: Namespace
metadata:
  name: nginx-proxy-manager
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: npm-data
  namespace: nginx-proxy-manager
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: npm-letsencrypt
  namespace: nginx-proxy-manager
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: npm
  namespace: nginx-proxy-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: npm
  template:
    metadata:
      labels:
        app: npm
    spec:
      containers:
      - name: npm
        image: jc21/nginx-proxy-manager:latest
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        - containerPort: 81
          name: admin
        volumeMounts:
        - name: data
          mountPath: /data
        - name: letsencrypt
          mountPath: /etc/letsencrypt
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: npm-data
      - name: letsencrypt
        persistentVolumeClaim:
          claimName: npm-letsencrypt
---
apiVersion: v1
kind: Service
metadata:
  name: npm
  namespace: nginx-proxy-manager
spec:
  selector:
    app: npm
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    name: http
  - port: 443
    targetPort: 443
    name: https
  - port: 81
    targetPort: 81
    name: admin
